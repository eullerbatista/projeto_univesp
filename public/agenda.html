<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda - Agendamento clínico</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .agenda-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .agenda-sidebar {
      flex: 0 0 250px;
      background: #ffffff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .agenda-main {
      flex: 1;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .agenda-data {
      margin-bottom: 20px;
    }
    .agenda-data h3 {
      color: #1f4c8f;
      border-bottom: 2px solid #1f4c8f;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .agenda-item {
      background: #f5f7fb;
      padding: 12px;
      border-left: 4px solid #1f4c8f;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .agenda-item-hora {
      font-weight: bold;
      color: #1f4c8f;
    }
    .agenda-item-info {
      font-size: 13px;
      margin-top: 5px;
      color: #555;
    }
    .agenda-status {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      margin-top: 5px;
    }
    .agenda-status.agendado {
      background: #FFC107;
      color: #333;
    }
    .agenda-status.concluido {
      background: #4CAF50;
      color: white;
    }
    .calendario {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-bottom: 20px;
    }
    .calendario-dia {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4fe;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      border: 2px solid transparent;
    }
    .calendario-dia:hover {
      border-color: #1f4c8f;
      background: #e8f0ff;
    }
    .calendario-dia.selecionado {
      background: #1f4c8f;
      color: white;
      font-weight: bold;
    }
    .filtro-especialidade {
      margin-bottom: 15px;
    }
    .filtro-especialidade label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    .filtro-especialidade select {
      width: 100%;
      padding: 8px;
    }
  </style>
</head>
<body>
  <h1>Agenda de Consultas</h1>
  <nav>
    <a href="index.html">Início</a> |
    <a href="cadastros.html">Cadastros</a> |
    <a href="agendamentos.html">Agendamentos</a>
  </nav>

  <div class="agenda-container">
    <div class="agenda-sidebar">
      <h3>Filtros</h3>
      <div class="filtro-especialidade">
        <label>Especialidade:</label>
        <select id="filtro-esp">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filtro-especialidade">
        <label>Mês:</label>
        <input type="month" id="filtro-mes" />
      </div>
      <button id="btn-aplicar-filtros" style="width: 100%; padding: 10px; background: #1f4c8f; color: white; border: none; border-radius: 5px; cursor: pointer;">Aplicar</button>
    </div>

    <div class="agenda-main">
      <div id="agenda-content">
        <h2>Selecione uma data para ver os agendamentos</h2>
      </div>
    </div>
  </div>

  <script src="app-agenda.js"></script>
</body>
</html>
